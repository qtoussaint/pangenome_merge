{% set name = "pangenomerge" %}
{% set version = "1.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/qtoussaint/pangenome_merge/archive/refs/tags/v{{ version }}.tar.gz
  sha256: ea330e54605888d5e99313af576afffef05aa99dc77625d58bde394a5d72d68a 

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation"

requirements:
  host:
    - python >=3.10
    - pip
  run:
    - python >=3.10
    - biopython >=1.80
    - networkx >=3.4.2
    - mmseqs2
    - numpy
    - pandas
    - scipy
    - scikit-learn
    - edlib
    - tqdm

test:
  imports:
    - pangenomerge
  commands:
    - python -c "import pangenomerge; print(pangenomerge.__version__)"
    - mmseqs --help

about:
  home: https://github.com/qtoussaint/pangenome_merge
  summary: "Create pangenome gene graphs for hundreds of thousands of bacterial genomes"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - qtoussaint
